<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HappySnap - Smart Lens AI</title>
    <!-- 제품 마스터의 0원 기술 스택: 브라우저 인공지능 엔진 포함 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- On-Device AI: TensorFlow.js & MobileNet -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .active-scale:active { transform: scale(0.95); transition: transform 0.1s; }
        
        /* 스마트 렌즈 스캐닝 애니메이션 */
        .scan-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(to bottom, transparent, #fb923c, transparent);
            top: 0;
            left: 0;
            animation: scan 2s linear infinite;
            z-index: 10;
        }
        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="bg-neutral-50 text-neutral-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const APP_NAME = "HappySnap";

        const LANGUAGES = {
            ko: { welcome: "스마트 렌즈로 찾는 요리의 행복", cta: "재료 사진 찍기", processing: "스마트 렌즈가 재료를 스캔 중...", result: "AI 추천 요리", share: "행복 공유", retry: "다시 스캔하기", watch: "레시피 영상 보기", happinessTip: "AI가 당신의 재료에서 행복한 영감을 찾아냈습니다!", aiLabel: "분석된 재료:", loadingModel: "AI 렌즈 가동 중..." },
            en: { welcome: "Cooking Happiness with Smart Lens", cta: "Snap Ingredients", processing: "Smart Lens Scanning...", result: "AI Recommended", share: "Share", retry: "Rescan", watch: "Watch Recipe", happinessTip: "AI found happy inspiration from your ingredients!", aiLabel: "Detected:", loadingModel: "Activating AI Lens..." }
        };

        // 글로벌 요리 지식 베이스
        const RECIPE_DB = [
            { id: 1, keywords: ["egg", "eggs", "omelet", "달걀", "계란"], name: { ko: "계란말이", en: "Rolled Omelet" }, query: "korean rolled omelet recipe" },
            { id: 2, keywords: ["tomato", "tomatoes", "토마토"], name: { ko: "토마토 달걀 볶음", en: "Tomato Egg Stir-fry" }, query: "tomato egg stir fry" },
            { id: 3, keywords: ["meat", "beef", "steak", "스테이크", "소고기"], name: { ko: "프리미엄 스테이크", en: "Premium Steak" }, query: "how to cook perfect steak" },
            { id: 4, keywords: ["kimchi", "cabbage", "김치"], name: { ko: "김치볶음밥", en: "Kimchi Fried Rice" }, query: "kimchi fried rice" },
            { id: 5, keywords: ["squid", "octopus", "seafood", "오징어", "해물"], name: { ko: "매콤 오징어 볶음", en: "Spicy Squid" }, query: "spicy stir fried squid" },
            { id: 6, keywords: ["garlic", "pasta", "spaghetti", "마늘", "파스타"], name: { ko: "알리오 올리오", en: "Aglio e Olio" }, query: "aglio e olio recipe" },
            { id: 7, keywords: ["bread", "toast", "빵", "식빵"], name: { ko: "프렌치 토스트", en: "French Toast" }, query: "easy french toast" },
            { id: 8, keywords: ["chicken", "닭", "치킨"], name: { ko: "간장 치킨", en: "Soy Sauce Chicken" }, query: "soy garlic chicken recipe" }
        ];

        function App() {
            const [lang, setLang] = useState('ko');
            const [step, setStep] = useState('landing'); // landing, processing, result
            const [image, setImage] = useState(null);
            const [result, setResult] = useState(null);
            const [detectedLabel, setDetectedLabel] = useState("");

            const t = LANGUAGES[lang] || LANGUAGES.en;

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [step, result]);

            const goHome = () => {
                setStep('landing');
                setImage(null);
                setResult(null);
                setDetectedLabel("");
            };

            // AI 스마트 렌즈 엔진 (On-Device)
            const runSmartLens = async (imgElement) => {
                setDetectedLabel(t.loadingModel);
                try {
                    const model = await mobilenet.load();
                    const predictions = await model.classify(imgElement);
                    const topResult = predictions[0].className.toLowerCase();
                    setDetectedLabel(topResult);
                    return topResult;
                } catch (error) {
                    console.error("AI Lens Error:", error);
                    return "ingredients";
                }
            };

            const findBestRecipe = (label) => {
                const words = label.toLowerCase();
                let bestMatch = null;
                let maxScore = -1;

                RECIPE_DB.forEach(recipe => {
                    let score = 0;
                    recipe.keywords.forEach(k => {
                        if (words.includes(k)) score += 50;
                    });
                    if (score > maxScore) {
                        maxScore = score;
                        bestMatch = recipe;
                    }
                });

                // 매칭 실패 시 동적 검색
                if (!bestMatch || maxScore <= 0) {
                    return {
                        id: 999,
                        name: { ko: `${label} 요리`, en: `${label} Dish` },
                        query: `${label} recipe easy`,
                        isDynamic: true
                    };
                }
                return bestMatch;
            };

            const handlePhotoAction = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setImage(reader.result);
                        setStep('processing');
                        
                        const img = new Image();
                        img.src = reader.result;
                        img.onload = async () => {
                            const label = await runSmartLens(img);
                            setTimeout(() => {
                                const match = findBestRecipe(label);
                                setResult({
                                    dishName: match.name[lang] || match.name['en'],
                                    videoUrl: `https://www.youtube.com/results?search_query=${encodeURIComponent(match.query)}`,
                                    isDynamic: match.isDynamic
                                });
                                setStep('result');
                            }, 1000);
                        };
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleShare = async () => {
                const text = `HappySnap 스마트 렌즈가 추천한 '${result.dishName}'! 🍳`;
                if (navigator.share) {
                    try { await navigator.share({ title: APP_NAME, text, url: window.location.href }); } catch (e) {}
                } else {
                    navigator.clipboard.writeText(window.location.href);
                    alert("링크가 복사되었습니다!");
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center bg-neutral-50 selection:bg-orange-100">
                    <header className="w-full max-w-2xl px-6 py-5 flex justify-between items-center bg-white/80 backdrop-blur-md border-b sticky top-0 z-50">
                        <button onClick={goHome} className="flex items-center gap-2 font-black text-2xl text-orange-600 active-scale">
                            <i data-lucide="chef-hat" className="w-8 h-8"></i>
                            <span className="tracking-tighter uppercase">{APP_NAME}</span>
                        </button>
                        <div className="flex items-center gap-2">
                            <button onClick={() => setLang(lang === 'ko' ? 'en' : 'ko')} className="text-[10px] font-black bg-neutral-100 px-3 py-1.5 rounded-full text-neutral-500 uppercase">
                                {lang}
                            </button>
                            <span className="text-[10px] font-bold text-white bg-orange-500 px-3 py-1.5 rounded-full shadow-lg shadow-orange-200">SMART LENS</span>
                        </div>
                    </header>

                    <main className="w-full max-w-lg px-6 py-10 flex-1 flex flex-col items-center">
                        {step === 'landing' && (
                            <div className="w-full flex flex-col gap-12 fade-in mt-10">
                                <div className="text-center space-y-4">
                                    <h1 className="text-4xl sm:text-5xl font-black leading-tight tracking-tight text-neutral-800 break-keep">
                                        {t.welcome}
                                    </h1>
                                    <p className="text-neutral-400 font-bold uppercase tracking-[0.2em] text-xs">Pure AI Vision • 0-Cost</p>
                                </div>

                                <label className="w-full aspect-square border-8 border-white rounded-[4rem] flex flex-col items-center justify-center gap-6 bg-white shadow-2xl shadow-orange-900/10 hover:scale-[1.02] transition-all cursor-pointer group active-scale relative overflow-hidden">
                                    <div className="bg-orange-500 p-8 rounded-full text-white shadow-xl shadow-orange-200 group-hover:rotate-12 transition-transform">
                                        <i data-lucide="camera" className="w-16 h-16"></i>
                                    </div>
                                    <span className="font-black text-xl text-neutral-700">{t.cta}</span>
                                    <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handlePhotoAction} />
                                    <div className="absolute inset-0 border-2 border-orange-100 rounded-[4rem] pointer-events-none opacity-50"></div>
                                </label>

                                <div className="flex items-center justify-center gap-2 text-neutral-400 text-[10px] font-bold uppercase tracking-widest">
                                    <i data-lucide="shield-check" className="w-4 h-4"></i>
                                    Anonymous • On-Device Neural Matcher
                                </div>
                            </div>
                        )}

                        {step === 'processing' && (
                            <div className="flex-1 flex flex-col items-center justify-center space-y-10 fade-in py-10 w-full">
                                <div className="relative w-full aspect-square max-w-[320px] rounded-[3rem] overflow-hidden shadow-2xl">
                                    <img src={image} className="w-full h-full object-cover grayscale opacity-50" />
                                    <div className="scan-line"></div>
                                    <div className="absolute inset-0 flex items-center justify-center">
                                        <div className="bg-white/90 backdrop-blur-md p-6 rounded-3xl shadow-xl flex flex-col items-center gap-3">
                                            <i data-lucide="scan-eye" className="w-10 h-10 text-orange-500 animate-pulse"></i>
                                            <p className="text-xs font-black text-orange-600 uppercase tracking-widest">Scanning...</p>
                                        </div>
                                    </div>
                                </div>
                                <div className="text-center space-y-3">
                                    <p className="text-2xl font-black text-neutral-800">{t.processing}</p>
                                    <p className="text-sm font-bold text-orange-400 uppercase tracking-widest px-6 py-2 bg-orange-50 rounded-full inline-block">
                                        {detectedLabel}
                                    </p>
                                </div>
                            </div>
                        )}

                        {step === 'result' && (
                            <div className="w-full space-y-8 fade-in pb-10">
                                <div className="bg-white rounded-[4rem] shadow-2xl overflow-hidden border border-neutral-100">
                                    <div className="h-64 bg-neutral-200 border-b relative">
                                        <img src={image} className="w-full h-full object-cover" />
                                        <div className="absolute top-6 right-6 bg-black/60 backdrop-blur-md text-white px-4 py-2 rounded-full text-[10px] font-black flex items-center gap-2 tracking-widest">
                                            <i data-lucide="zap" className="w-3 h-3 text-yellow-400 fill-current"></i> SMART VERIFIED
                                        </div>
                                    </div>
                                    <div className="p-10 space-y-8">
                                        <div className="text-center space-y-3">
                                            <span className="text-orange-500 font-black text-[10px] uppercase tracking-[0.4em]">{t.result}</span>
                                            <h2 className="text-4xl font-black text-neutral-900 tracking-tight leading-none break-words">{result.dishName}</h2>
                                        </div>
                                        <p className="text-md text-neutral-500 italic font-medium leading-relaxed text-center px-2">" {t.happinessTip} "</p>
                                        
                                        <div className="grid grid-cols-1 gap-4 pt-4">
                                            <a href={result.videoUrl} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-4 bg-red-600 text-white py-5 rounded-[2rem] font-black text-xl hover:bg-red-700 shadow-2xl shadow-red-200 transition-all active-scale">
                                                <i data-lucide="youtube" className="w-7 h-7"></i> {t.watch}
                                            </a>
                                            <button onClick={handleShare} className="flex items-center justify-center gap-4 bg-blue-50 text-blue-600 py-5 rounded-[2rem] font-black text-xl hover:bg-blue-100 transition-all active-scale">
                                                <i data-lucide="share-2" className="w-7 h-7"></i> {t.share}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={goHome} className="w-full flex items-center justify-center gap-2 text-neutral-400 font-black py-6 hover:text-orange-500 transition-colors uppercase tracking-widest text-sm">
                                    <i data-lucide="refresh-ccw" className="w-5 h-5"></i> {t.retry}
                                </button>
                            </div>
                        )}
                    </main>

                    <footer className="w-full max-w-2xl px-6 py-12 text-center border-t border-neutral-100 opacity-40">
                        <p className="text-[10px] text-neutral-400 font-bold uppercase tracking-[0.4em] leading-loose">
                            HappySnap Smart Lens v6.0 • Pure On-Device AI<br/>
                            100% Neural Processing • Absolute 0-Cost
                        </p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
