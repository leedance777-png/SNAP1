<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HappySnap - AI Agent Chef v9.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .active-scale:active { transform: scale(0.95); transition: transform 0.1s; }
        
        .ai-pulse { animation: ai-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes ai-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: linear-gradient(to bottom, transparent, #fb923c, transparent);
            top: 0;
            left: 0;
            animation: scan 2.5s linear infinite;
            z-index: 20;
        }
        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="bg-neutral-50 text-neutral-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const APP_NAME = "HappySnap";
        const API_KEY = ""; // 시스템 주입
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";

        const LANGUAGES = {
            ko: { 
                welcome: "유튜브보다 똑똑한 AI 셰프 렌즈", 
                cta: "재료 사진 찍기", 
                processing: "AI가 재료를 분석하고 레시피를 집필 중...", 
                result: "AI 셰프의 제안", 
                share: "행복 공유", 
                retry: "다시 찍기", 
                watch: "참고 영상 보기", 
                aiRecipe: "✨ AI 맞춤 가이드",
                happinessTip: "이 요리가 당신에게 행복을 주는 이유",
                placeholder: "사진 분석에 실패했나요? 재료를 직접 입력해 보세요."
            },
            en: { 
                welcome: "Smarter than YouTube: AI Chef Lens", 
                cta: "Snap Ingredients", 
                processing: "AI Analyzing & Writing Recipe...", 
                result: "AI Chef's Recommendation", 
                share: "Share", 
                retry: "Retake", 
                watch: "Watch Reference", 
                aiRecipe: "✨ AI Custom Guide",
                happinessTip: "Why this dish brings joy",
                placeholder: "Analysis failed? Type manually."
            }
        };

        function App() {
            const [lang, setLang] = useState('ko');
            const [step, setStep] = useState('landing'); // landing, processing, result
            const [image, setImage] = useState(null);
            const [result, setResult] = useState(null);
            const [isError, setIsError] = useState(false);

            const t = LANGUAGES[lang] || LANGUAGES.en;

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [step, result]);

            const goHome = () => {
                setStep('landing');
                setImage(null);
                setResult(null);
                setIsError(false);
            };

            // Gemini API 호출 (Exponential Backoff 적용)
            const callGemini = async (base64ImageData) => {
                const systemPrompt = `You are a world-class chef and nutritionist. 
                Analyze the provided image of cooking ingredients. 
                1. Identify the primary ingredient.
                2. Suggest one specific dish.
                3. Provide 3 simple recipe steps.
                4. Give a "Happiness Tip" (why this dish is good for mood/health).
                5. Provide a YouTube search query.
                Respond in strictly valid JSON format:
                {
                    "ingredient": "string",
                    "dishName": "string",
                    "recipeSteps": ["step1", "step2", "step3"],
                    "happinessTip": "string",
                    "youtubeQuery": "string"
                }
                The language of the response values must be ${lang === 'ko' ? 'Korean' : 'English'}.`;

                let delay = 1000;
                for (let i = 0; i < 5; i++) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{
                                    parts: [
                                        { text: "What can I cook with these?" },
                                        { inlineData: { mimeType: "image/png", data: base64ImageData.split(',')[1] } }
                                    ]
                                }],
                                systemInstruction: { parts: [{ text: systemPrompt }] },
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });

                        if (!response.ok) throw new Error('API failed');
                        const data = await response.json();
                        return JSON.parse(data.candidates[0].content.parts[0].text);
                    } catch (err) {
                        if (i === 4) throw err;
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                    }
                }
            };

            const handlePhotoAction = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        const base64 = reader.result;
                        setImage(base64);
                        setStep('processing');
                        try {
                            const aiResult = await callGemini(base64);
                            setResult(aiResult);
                            setStep('result');
                        } catch (err) {
                            setIsError(true);
                            setStep('landing');
                        }
                    };
                    reader.readAsDataURL(file);
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center bg-white selection:bg-orange-100">
                    <header className="w-full max-w-2xl px-6 py-5 flex justify-between items-center bg-white border-b sticky top-0 z-50">
                        <button onClick={goHome} className="flex items-center gap-2 font-black text-2xl text-orange-600 active-scale">
                            <i data-lucide="chef-hat" className="w-8 h-8"></i>
                            <span className="tracking-tighter uppercase">{APP_NAME}</span>
                        </button>
                        <button onClick={() => setLang(lang === 'ko' ? 'en' : 'ko')} className="text-[10px] font-black bg-slate-100 px-3 py-1.5 rounded-full text-slate-500 uppercase active-scale">
                            {lang}
                        </button>
                    </header>

                    <main className="w-full max-w-lg px-6 py-8 flex-1 flex flex-col items-center">
                        {isError && (
                            <div className="w-full mb-6 p-4 bg-red-50 text-red-600 rounded-2xl text-sm font-bold flex items-center gap-2 fade-in">
                                <i data-lucide="alert-circle" className="w-4 h-4"></i> 분석에 실패했습니다. 조명이 밝은 곳에서 다시 찍어주세요.
                            </div>
                        )}

                        {step === 'landing' && (
                            <div className="w-full flex flex-col gap-10 fade-in mt-6">
                                <div className="text-center space-y-4 px-4">
                                    <h1 className="text-4xl font-black leading-tight tracking-tight text-slate-800 break-keep">
                                        {t.welcome}
                                    </h1>
                                    <div className="flex justify-center">
                                        <div className="bg-orange-500 text-white text-[10px] font-bold px-3 py-1 rounded-full flex items-center gap-1">
                                            <i data-lucide="sparkles" className="w-3 h-3"></i> GEMINI 2.5 FLASH POWERED
                                        </div>
                                    </div>
                                </div>

                                <label className="w-full aspect-square border-4 border-slate-100 rounded-[3rem] flex flex-col items-center justify-center gap-6 bg-slate-50 hover:bg-white hover:border-orange-200 transition-all cursor-pointer group active-scale shadow-inner overflow-hidden relative">
                                    <div className="bg-orange-500 p-8 rounded-full text-white shadow-xl shadow-orange-200 group-hover:scale-110 transition-transform">
                                        <i data-lucide="camera" className="w-16 h-16"></i>
                                    </div>
                                    <div className="text-center">
                                        <span className="font-black text-xl text-slate-700 block">{t.cta}</span>
                                        <span className="text-xs text-slate-400 font-bold mt-1 block">AI가 즉석 레시피를 써드립니다</span>
                                    </div>
                                    <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handlePhotoAction} />
                                </label>
                                
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-white p-4 rounded-3xl border border-slate-100 flex flex-col items-center gap-2 text-center">
                                        <i data-lucide="brain" className="text-orange-500"></i>
                                        <span className="text-[10px] font-bold text-slate-500">AI 이미지 인식</span>
                                    </div>
                                    <div className="bg-white p-4 rounded-3xl border border-slate-100 flex flex-col items-center gap-2 text-center">
                                        <i data-lucide="book-open" className="text-orange-500"></i>
                                        <span className="text-[10px] font-bold text-slate-500">즉석 레시피 생성</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 'processing' && (
                            <div className="flex-1 flex flex-col items-center justify-center space-y-10 fade-in py-10 w-full">
                                <div className="relative w-full aspect-square max-w-[340px] rounded-[3rem] overflow-hidden shadow-2xl ring-8 ring-white">
                                    <img src={image} className="w-full h-full object-cover" />
                                    <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-[2px]"></div>
                                    <div className="scan-line"></div>
                                    <div className="absolute inset-0 flex items-center justify-center">
                                        <div className="bg-white/90 backdrop-blur-md p-6 rounded-3xl shadow-xl flex flex-col items-center gap-3">
                                            <i data-lucide="loader-2" className="w-10 h-10 text-orange-500 animate-spin"></i>
                                            <p className="text-xs font-black text-orange-600 uppercase tracking-widest">AI Writing...</p>
                                        </div>
                                    </div>
                                </div>
                                <div className="text-center">
                                    <p className="text-2xl font-black text-slate-800 ai-pulse">{t.processing}</p>
                                </div>
                            </div>
                        )}

                        {step === 'result' && (
                            <div className="w-full space-y-6 fade-in pb-10">
                                <div className="bg-white rounded-[4rem] shadow-2xl overflow-hidden border border-slate-100">
                                    <div className="h-48 relative">
                                        <img src={image} className="w-full h-full object-cover" />
                                        <div className="absolute top-6 right-6 bg-orange-500 text-white px-4 py-2 rounded-full text-[10px] font-black flex items-center gap-2 shadow-lg">
                                            <i data-lucide="award" className="w-3 h-3 text-yellow-400 fill-current"></i> AI CHEF VERIFIED
                                        </div>
                                    </div>
                                    <div className="p-8 space-y-6">
                                        <div className="text-center space-y-2">
                                            <span className="text-orange-500 font-black text-[10px] uppercase tracking-[0.4em]">{result.ingredient}</span>
                                            <h2 className="text-4xl font-black text-slate-900 tracking-tight leading-none break-words">{result.dishName}</h2>
                                        </div>
                                        
                                        <div className="bg-orange-50 p-6 rounded-[2rem] space-y-4 border border-orange-100">
                                            <h3 className="text-sm font-black text-orange-600 flex items-center gap-2 uppercase tracking-wider">
                                                <i data-lucide="list-checks" className="w-4 h-4"></i> {t.aiRecipe}
                                            </h3>
                                            <div className="space-y-3">
                                                {result.recipeSteps.map((step, i) => (
                                                    <div key={i} className="flex gap-3 items-start">
                                                        <span className="w-5 h-5 bg-orange-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center shrink-0 mt-0.5">{i+1}</span>
                                                        <p className="text-sm text-orange-900 font-medium leading-relaxed">{step}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="bg-blue-50 p-5 rounded-3xl border border-blue-100 flex gap-3 items-start">
                                            <i data-lucide="heart" className="w-5 h-5 text-blue-500 shrink-0 mt-0.5 fill-current"></i>
                                            <div className="space-y-1">
                                                <h4 className="text-[10px] font-bold text-blue-600 uppercase tracking-widest">{t.happinessTip}</h4>
                                                <p className="text-sm text-blue-900 font-medium leading-relaxed">{result.happinessTip}</p>
                                            </div>
                                        </div>
                                        
                                        <div className="grid grid-cols-1 gap-3 pt-2">
                                            <a 
                                                href={`https://www.youtube.com/results?search_query=${encodeURIComponent(result.youtubeQuery)}`} 
                                                target="_blank" 
                                                rel="noopener noreferrer" 
                                                className="flex items-center justify-center gap-3 bg-red-600 text-white py-5 rounded-[2rem] font-black text-lg hover:bg-red-700 shadow-xl transition-all active-scale"
                                            >
                                                <i data-lucide="youtube" className="w-6 h-6 fill-current"></i> {t.watch}
                                            </a>
                                            <button 
                                                onClick={() => {
                                                    const text = `HappySnap AI Chef가 추천한 '${result.dishName}' 레시피! 🍳`;
                                                    if (navigator.share) navigator.share({ title: APP_NAME, text, url: window.location.href });
                                                }} 
                                                className="flex items-center justify-center gap-3 bg-slate-100 text-slate-700 py-5 rounded-[2rem] font-black text-lg hover:bg-slate-200 transition-all active-scale"
                                            >
                                                <i data-lucide="share" className="w-6 h-6"></i> {t.share}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={goHome} className="w-full flex items-center justify-center gap-2 text-slate-400 font-black py-4 hover:text-orange-500 transition-colors uppercase tracking-widest text-xs active-scale">
                                    <i data-lucide="refresh-cw" className="w-4 h-4"></i> {t.retry}
                                </button>
                            </div>
                        )}
                    </main>

                    <footer className="w-full max-w-2xl px-6 py-12 text-center border-t border-slate-100 opacity-30">
                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-[0.4em] leading-loose">
                            HappySnap AI Chef Agent v9.0 • Powered by Gemini<br/>
                            Beyond Manual Search • Guaranteed 0-Cost
                        </p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
